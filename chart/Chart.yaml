apiVersion: v2
name: bee-module
description: >-
  bee 공용 모듈 차트 — **엔진**. module.yaml(논리) + values-<env>(좌표)에서 매니페스트를
  *helm 이* 파생한다. 입력 계약은 values.schema.json — helm 이 render 시점에 검증하고,
  공식 검증은 CI lint 가 맡는다. CLI 는 이 차트를 `helm template` 으로 부를 뿐(기계적 배치).
  모듈은 spec.chart.version 으로 이 차트를 pin 한다.
type: application
version: 1.0.0
# 발행 레포 선언 — helm 이 sources[0] 을 OCI org.opencontainers.image.source 라벨로 매핑.
# GitHub 이 이 라벨로 패키지를 이 레포에 연결하므로, 발행 레포의 GITHUB_TOKEN 이 push 권한을 갖는다.
sources:
  - https://github.com/jbyee-test-org/bee-chart
