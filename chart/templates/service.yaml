{{- with (.Values.spec.routing | default list | first) }}   {{- /* routing 부재(schema 모듈)면 nil → skip */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}
  namespace: {{ include "bee.namespace" $ }}
spec:
  selector:
    app.kubernetes.io/name: {{ $.Release.Name }}
  ports:
    - port: {{ .port }}
      targetPort: {{ .port }}
{{- end }}
