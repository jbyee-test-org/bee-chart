{{- /* secrets(논리: group/property) → ExternalSecret. ASM 경로·store 는 values-env 좌표.
       로컬 개발 환경(env=local)은 External Secrets Operator 가 없으므로 이 리소스를 렌더하지 않는다.
       대신 bee 가 secrets.local.yaml 을 {release}-secrets Secret 으로 직접 적용한다.
       선언(spec.secrets)은 로컬과 공유 환경 양쪽에서 동일하다. */ -}}
{{- if and .Values.spec.secrets (ne .Values.env "local") }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ include "bee.namespace" $ }}
spec:
  secretStoreRef:
    kind: {{ .Values.secretStore.kind }}
    name: {{ .Values.secretStore.name }}
  target:
    name: {{ .Release.Name }}-secrets
  data:
    {{- range .Values.spec.secrets }}
    - secretKey: {{ .property }}
      remoteRef:
        key: {{ $.Values.asmPrefix }}/{{ $.Values.env }}/{{ $.Release.Name }}/{{ .group }}
        property: {{ .property }}
    {{- end }}
{{- end }}
