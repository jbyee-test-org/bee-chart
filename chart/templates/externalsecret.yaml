{{- /* secrets(논리: group/property) → ExternalSecret. ASM 경로·store 는 values-env 좌표.
       인너루프(env=local)는 ESO 없음 → 렌더 안 함(G27). 인너 충족은 bee 가 secrets.local.yaml 을
       {release}-secrets Secret 으로 직접 apply(합성 아닌 적용). 계약(spec.secrets)은 양쪽 동일. */ -}}
{{- if and .Values.spec.secrets (ne .Values.env "local") }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ include "bee.namespace" $ }}
spec:
  secretStoreRef:
    kind: {{ .Values.secretStore.kind }}
    name: {{ .Values.secretStore.name }}
  target:
    name: {{ .Release.Name }}-secrets
  data:
    {{- range .Values.spec.secrets }}
    - secretKey: {{ .property }}
      remoteRef:
        key: {{ $.Values.asmPrefix }}/{{ $.Values.env }}/{{ $.Release.Name }}/{{ .group }}
        property: {{ .property }}
    {{- end }}
{{- end }}
