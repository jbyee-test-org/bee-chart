{{- /* 영속 볼륨 — spec.uses.storage 의 프로파일을 platform `resources.storage.<profile>`({storageClass,size}) 에서 룩업해 렌더.
       모듈은 논리(`uses: {storage: {profile, mount}}`)만 선언하고 배포 위치를 모른다; 실제 class·size 는 platform 이 정한다.
       이건 선언과 렌더일 뿐 프로비저닝이 아니다 — 볼륨을 실제로 만드는 건 StorageClass 다. RWO 접근이므로 워크로드는 Deployment Recreate 전략과 짝지어야 한다. */ -}}
{{- with (.Values.spec.uses | default dict).storage }}
{{- $sp := index (($.Values.resources | default dict).storage | default dict) .profile }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $.Release.Name }}-data
  namespace: {{ include "bee.namespace" $ }}
  labels:
    app.kubernetes.io/name: {{ $.Release.Name }}
spec:
  accessModes: [ReadWriteOnce]
  {{- with $sp.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ $sp.size | default "1Gi" }}
{{- end }}
