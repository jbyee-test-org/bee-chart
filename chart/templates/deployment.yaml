{{- /* 이미지 = registry / image.name + digest(prod) | tag(local).
       image 생략 = 워크로드 없는 schema 전용 모듈 → Deployment 렌더 안 함(db.migrations·grants 만 소유). */ -}}
{{- if .Values.spec.image }}
{{- $tagref := printf ":%s" (.Values.imageTag | default "latest") -}}
{{- if .Values.imageDigest }}{{ $tagref = printf "@%s" .Values.imageDigest }}{{ end -}}
{{- /* 리소스: spec.uses(논리 참조) → .Values.resources(플랫폼 프로파일 — bee 가 전달·values override)
       를 차트가 룩업·렌더. compute→container.resources · storage→PVC+mount(+Recreate). */ -}}
{{- $u := .Values.spec.uses | default dict -}}
{{- $res := .Values.resources | default dict -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ include "bee.namespace" $ }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  replicas: 1
  {{- if $u.storage }}
  strategy: { type: Recreate }   {{- /* RWO PVC — 롤링 시 두 pod 가 같은 볼륨 못 붙음 */}}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.registry }}/{{ .Values.spec.image.name }}{{ $tagref }}"
          {{- if .Values.imageDigest }}{{- else }}
          imagePullPolicy: Never   {{- /* 로컬 tag 는 pull 안 함 */}}
          {{- end }}
          ports:
            {{- range .Values.spec.routing }}
            - containerPort: {{ .port }}
            {{- end }}
          {{- if .Values.spec.secrets }}
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
          {{- end }}
          {{- with index ($res.compute | default dict) ($u.compute | default "") }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $u.storage }}
          volumeMounts:
            - name: data
              mountPath: {{ .mount }}
          {{- end }}
      {{- with $u.storage }}
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: {{ $.Release.Name }}-data }
      {{- end }}
{{- end }}
